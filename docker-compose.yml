services:
  db-rest:
    image: derhuerst/db-rest:6
    container_name: db-rest
    restart: unless-stopped
    environment:
      - USER_AGENT=HiMeS/1.0
      - TZ=Europe/Berlin
    ports:
      - "127.0.0.1:3000:3000"    # nur lokal erreichbar
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/stops/8000259"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  himes:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: himes
    restart: unless-stopped
    depends_on:
      db-rest:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./data:/app/data          # MEMORY.md persistence
      - ./logs:/app/logs          # Log files
      - ./config:/app/config      # MCP config
    environment:
      - PYTHONUNBUFFERED=1
      - TZ=Europe/Berlin
    ports:
      - "${HEALTH_PORT:-8080}:8080"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
